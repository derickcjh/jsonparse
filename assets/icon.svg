<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>

    <!-- Purple gradient for braces -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- Subtle inner border -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Top highlight -->
  <rect x="48" y="33" width="416" height="1" rx="0.5" fill="white" opacity="0.1"/>

  <!-- JSON Braces { } -->
  <g filter="url(#glow)">
    <!-- Left brace { -->
    <path d="M160 176 Q130 176 130 206 L130 236 Q130 256 110 256 Q130 256 130 276 L130 306 Q130 336 160 336"
          stroke="url(#purpleGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Right brace } -->
    <path d="M352 176 Q382 176 382 206 L382 236 Q382 256 402 256 Q382 256 382 276 L382 306 Q382 336 352 336"
          stroke="url(#purpleGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Tree structure dots -->
  <g fill="url(#accentGradient)">
    <!-- Level 1 -->
    <circle cx="220" cy="210" r="12"/>
    <circle cx="292" cy="210" r="12"/>

    <!-- Level 2 -->
    <circle cx="220" cy="256" r="12"/>
    <circle cx="292" cy="256" r="12"/>

    <!-- Level 3 -->
    <circle cx="220" cy="302" r="12"/>
    <circle cx="292" cy="302" r="12"/>
  </g>

  <!-- Connecting lines (tree structure) -->
  <g stroke="url(#accentGradient)" stroke-width="3" opacity="0.5">
    <line x1="232" y1="210" x2="280" y2="210"/>
    <line x1="232" y1="256" x2="280" y2="256"/>
    <line x1="232" y1="302" x2="280" y2="302"/>
    <line x1="256" y1="222" x2="256" y2="244"/>
    <line x1="256" y1="268" x2="256" y2="290"/>
  </g>

  <!-- Accent glow behind center -->
  <circle cx="256" cy="256" r="60" fill="url(#accentGradient)" opacity="0.1"/>
</svg>
